<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparks with Soul — Tina Sharkey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: #fdf6f0;
    color: #1a0a08;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.5;
  }

  .hero {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    background: #fdf6f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.25rem 3rem;
  }

  .hero-eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #8a5040;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .canvas-stage {
    width: 100%;
    max-width: 900px;
    background: transparent;
    box-sizing: border-box;
  }

  #particle-canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  .hero-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 300;
    color: #4a2018;
    text-align: center;
    margin-top: 1.75rem;
    max-width: 32rem;
    line-height: 1.5;
  }

  .hero-nav {
    margin-top: 2.25rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9c3020;
    text-decoration: underline;
    text-underline-offset: 4px;
    transition: color 0.2s;
  }

  .hero-nav:hover {
    color: #7b2415;
  }

  .hero-hint {
    margin-top: 1.5rem;
    font-size: 11px;
    color: #8a5040;
    text-align: center;
    max-width: 26rem;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="hero">
  <p class="hero-eyebrow">TINA SHARKEY</p>

  <div class="canvas-stage">
    <canvas id="particle-canvas" width="900" height="450" aria-label="SPARKS WITH SOUL particle text"></canvas>
  </div>

  <p class="hero-subtitle">A newsletter about possibilities</p>

  <a class="hero-nav" href="fortification_wheel.html">THE FORTIFICATION WHEEL →</a>

  <p class="hero-hint">The line holds once it forms; reload the page to see the motion again.</p>
</div>

<script>
(function () {
  'use strict';

  var CREAM = { r: 253, g: 246, b: 240 };

  var redPalette = [
    { r: 156, g: 48, b: 32 },
    { r: 184, g: 64, b: 48 },
    { r: 200, g: 85, b: 64 },
    { r: 217, g: 112, b: 96 },
    { r: 92, g: 26, b: 14 },
    { r: 123, g: 36, b: 21 },
  ];

  function Particle() {
    this.pos = { x: 0, y: 0 };
    this.vel = { x: 0, y: 0 };
    this.acc = { x: 0, y: 0 };
    this.target = { x: 0, y: 0 };
    this.closeEnoughTarget = 100;
    this.maxSpeed = 1.0;
    this.maxForce = 0.1;
    this.particleSize = 10;
    this.startColor = { r: CREAM.r, g: CREAM.g, b: CREAM.b };
    this.targetColor = { r: CREAM.r, g: CREAM.g, b: CREAM.b };
    this.colorWeight = 0;
    this.colorBlendRate = 0.01;
    this.settled = false;
  }

  Particle.prototype.move = function () {
    if (this.settled) {
      return;
    }

    var proximityMult = 1;
    var dx = this.pos.x - this.target.x;
    var dy = this.pos.y - this.target.y;
    var distance = Math.sqrt(dx * dx + dy * dy);

    if (distance < 0.85) {
      this.pos.x = this.target.x;
      this.pos.y = this.target.y;
      this.vel.x = 0;
      this.vel.y = 0;
      this.colorWeight = 1;
      this.settled = true;
      return;
    }

    if (distance < this.closeEnoughTarget) {
      proximityMult = distance / this.closeEnoughTarget;
    }

    var towardsTarget = {
      x: this.target.x - this.pos.x,
      y: this.target.y - this.pos.y,
    };

    var magnitude = Math.sqrt(towardsTarget.x * towardsTarget.x + towardsTarget.y * towardsTarget.y);
    if (magnitude > 0) {
      towardsTarget.x = (towardsTarget.x / magnitude) * this.maxSpeed * proximityMult;
      towardsTarget.y = (towardsTarget.y / magnitude) * this.maxSpeed * proximityMult;
    }

    var steer = {
      x: towardsTarget.x - this.vel.x,
      y: towardsTarget.y - this.vel.y,
    };

    var steerMagnitude = Math.sqrt(steer.x * steer.x + steer.y * steer.y);
    if (steerMagnitude > 0) {
      steer.x = (steer.x / steerMagnitude) * this.maxForce;
      steer.y = (steer.y / steerMagnitude) * this.maxForce;
    }

    this.acc.x += steer.x;
    this.acc.y += steer.y;

    this.vel.x += this.acc.x;
    this.vel.y += this.acc.y;
    this.pos.x += this.vel.x;
    this.pos.y += this.vel.y;
    this.acc.x = 0;
    this.acc.y = 0;
  };

  Particle.prototype.draw = function (ctx, drawAsPoints) {
    if (this.colorWeight < 1.0) {
      this.colorWeight = Math.min(this.colorWeight + this.colorBlendRate, 1.0);
    }

    var cr = Math.round(this.startColor.r + (this.targetColor.r - this.startColor.r) * this.colorWeight);
    var cg = Math.round(this.startColor.g + (this.targetColor.g - this.startColor.g) * this.colorWeight);
    var cb = Math.round(this.startColor.b + (this.targetColor.b - this.startColor.b) * this.colorWeight);

    if (drawAsPoints) {
      ctx.fillStyle = 'rgb(' + cr + ',' + cg + ',' + cb + ')';
      ctx.fillRect(this.pos.x, this.pos.y, 1, 1);
    } else {
      ctx.fillStyle = 'rgb(' + cr + ',' + cg + ',' + cb + ')';
      ctx.beginPath();
      ctx.arc(this.pos.x, this.pos.y, this.particleSize / 2, 0, Math.PI * 2);
      ctx.fill();
    }
  };

  function generateRandomPos(x, y, mag) {
    var randomX = Math.random() * canvas.width;
    var randomY = Math.random() * canvas.height;
    var direction = { x: randomX - x, y: randomY - y };
    var magnitude = Math.sqrt(direction.x * direction.x + direction.y * direction.y);
    if (magnitude > 0) {
      direction.x = (direction.x / magnitude) * mag;
      direction.y = (direction.y / magnitude) * mag;
    }
    return { x: x + direction.x, y: y + direction.y };
  }

  var PHRASE = 'SPARKS WITH SOUL';
  /* Sample every Nth pixel along the mask (2 ≈ 9× denser than 6; full letterforms stay readable) */
  var pixelSteps = 2;
  var drawAsPoints = true;

  var canvas = document.getElementById('particle-canvas');
  var ctx = canvas.getContext('2d');
  var particles = [];
  var animationId = null;
  var staticMode = false;

  function layoutFromText(phrase) {
    var offscreenCanvas = document.createElement('canvas');
    offscreenCanvas.width = canvas.width;
    offscreenCanvas.height = canvas.height;
    var offscreenCtx = offscreenCanvas.getContext('2d');

    offscreenCtx.clearRect(0, 0, canvas.width, canvas.height);
    offscreenCtx.fillStyle = '#ffffff';
    offscreenCtx.textAlign = 'center';
    offscreenCtx.textBaseline = 'middle';

    var fontSize = 72;
    do {
      offscreenCtx.font = "300 " + fontSize + "px 'Cormorant Garamond', Georgia, serif";
      if (offscreenCtx.measureText(phrase).width <= canvas.width - 40) {
        break;
      }
      fontSize -= 2;
    } while (fontSize >= 32);

    offscreenCtx.fillText(phrase, canvas.width / 2, canvas.height / 2);

    var imageData = offscreenCtx.getImageData(0, 0, canvas.width, canvas.height);
    var pixels = imageData.data;

    var particleIndex = 0;
    var coordsIndexes = [];
    for (var i = 0; i < pixels.length; i += pixelSteps * 4) {
      coordsIndexes.push(i);
    }
    for (var ci = coordsIndexes.length - 1; ci > 0; ci--) {
      var j = Math.floor(Math.random() * (ci + 1));
      var tmp = coordsIndexes[ci];
      coordsIndexes[ci] = coordsIndexes[j];
      coordsIndexes[j] = tmp;
    }

    for (var k = 0; k < coordsIndexes.length; k++) {
      var coordIndex = coordsIndexes[k];
      var alpha = pixels[coordIndex + 3];
      if (alpha > 48) {
        var pixelIndex = coordIndex;
        var x = (pixelIndex / 4) % canvas.width;
        var y = Math.floor(pixelIndex / 4 / canvas.width);

        var particle;
        if (particleIndex < particles.length) {
          particle = particles[particleIndex];
          particle.settled = false;
          particleIndex++;
        } else {
          particle = new Particle();
          var rp = generateRandomPos(canvas.width / 2, canvas.height / 2, (canvas.width + canvas.height) / 2);
          particle.pos.x = rp.x;
          particle.pos.y = rp.y;
          particle.maxSpeed = Math.random() * 6 + 4;
          particle.maxForce = particle.maxSpeed * 0.05;
          particle.particleSize = Math.random() * 6 + 6;
          particle.colorBlendRate = Math.random() * 0.0275 + 0.0025;
          particle.settled = false;
          particles.push(particle);
        }

        particle.startColor = {
          r: particle.startColor.r + (particle.targetColor.r - particle.startColor.r) * particle.colorWeight,
          g: particle.startColor.g + (particle.targetColor.g - particle.startColor.g) * particle.colorWeight,
          b: particle.startColor.b + (particle.targetColor.b - particle.startColor.b) * particle.colorWeight,
        };
        particle.targetColor = redPalette[Math.floor(Math.random() * redPalette.length)];
        particle.colorWeight = 0;
        particle.target.x = x;
        particle.target.y = y;
      }
    }

    if (particles.length > particleIndex) {
      particles.length = particleIndex;
    }
  }

  function animate() {
    if (staticMode) {
      return;
    }

    ctx.fillStyle = 'rgba(253, 246, 240, 0.15)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    var allSettled = particles.length > 0;
    var i;
    for (i = 0; i < particles.length; i++) {
      var p = particles[i];
      if (!p.settled) {
        p.move();
      }
      if (!p.settled) {
        allSettled = false;
      }
      p.draw(ctx, drawAsPoints);
    }

    if (allSettled && particles.length > 0) {
      staticMode = true;
      ctx.fillStyle = 'rgb(' + CREAM.r + ',' + CREAM.g + ',' + CREAM.b + ')';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (i = 0; i < particles.length; i++) {
        particles[i].draw(ctx, drawAsPoints);
      }
      return;
    }

    animationId = requestAnimationFrame(animate);
  }

  function start() {
    ctx.fillStyle = 'rgb(' + CREAM.r + ',' + CREAM.g + ',' + CREAM.b + ')';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    layoutFromText(PHRASE);

    if (particles.length === 0) {
      staticMode = true;
      return;
    }

    animate();
  }

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(start);
  } else {
    start();
  }

  window.addEventListener('beforeunload', function () {
    if (animationId) {
      cancelAnimationFrame(animationId);
    }
  });
})();
</script>
</body>
</html>
